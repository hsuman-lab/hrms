version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrms_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hrms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d hrms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hrms_user:${POSTGRES_PASSWORD:-hrms_secure_password}@postgres:5432/hrms_db
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-to-a-long-random-string}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hrms_network

  nginx:
    image: nginx:alpine
    container_name: hrms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hrms_network

networks:
  hrms_network:
    driver: bridge

volumes:
  postgres_data:
